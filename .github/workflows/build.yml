#
# Build (and on tag pushes, publish) `vectordata` release binaries.
#
#   build — 4-way matrix producing bare per-platform binaries.
#     All runners are native (no QEMU emulation):
#       linux/amd64    → ubuntu-24.04          + musl static linking
#       linux/arm64    → ubuntu-24.04-arm      + musl static linking
#       macos/arm64    → macos-14              + system toolchain
#       windows/amd64  → windows-2022          + bundled MSVC toolchain
#
#     Linux binaries target `*-unknown-linux-musl` — fully statically
#     linked, no glibc dependency at runtime. Runs on any Linux kernel
#     >= 2.6.39 regardless of distribution (Ubuntu 18.04, RHEL 7,
#     Alpine, anything). The dynamically-linked `*-unknown-linux-gnu`
#     binary takes its glibc baseline from the build host, so a
#     binary built on ubuntu-24.04 (glibc 2.39) refuses to load on
#     anything older. Musl sidesteps that entire problem.
#     Each row: install platform deps, install pinned Rust toolchain,
#     restore cargo cache, build `vectordata` (release, --no-default-
#     features --features cli to keep the binary self-contained),
#     `cargo test -p vectordata --release`, smoke-test the binary,
#     upload artifact.
#
#   release — fires only on `v*` tag pushes. Downloads each per-target
#     binary artifact, renames it to include the target triple,
#     generates SHA256SUMS, attaches everything to a GitHub Release.
#     Tags containing `-` (e.g. `v1.0.0-rc1`) get auto-marked as
#     prereleases.

name: build

on:
  push:
    branches: [main]
    # `cargo ws publish` emits one `<crate>@<version>` tag per
    # changed crate; an accompanying manual `v<version>` tag is the
    # canonical workspace-wide release marker. We trigger the build
    # matrix on every flavour so a regression in any crate's release
    # cycle gets caught — but the `release` job below only publishes
    # on `v*` (it checks the ref explicitly), so per-crate tags
    # build + test without producing duplicate GitHub Releases.
    tags:
      - 'v*'
      - 'vectordata@*'
      - 'veks@*'
      - 'veks-pipeline@*'
      - 'veks-core@*'
      - 'veks-anode@*'
      - 'slabtastic@*'
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR. Tag pushes keep
# running uniquely (each tag is its own ref).
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      # One platform failing should not stop the others — release
      # readiness wants the full per-platform signal.
      fail-fast: false
      matrix:
        include:
          # `exe_suffix` is appended to every binary basename when
          # composing the release output path. Empty on Unix-likes,
          # ".exe" on Windows. Keeping it in the matrix means every
          # later step builds its path with the same `${name}${suffix}`
          # template — no platform-specific branching in step bodies.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            os:     linux
            exe_suffix: ""
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            os:     linux
            exe_suffix: ""
          - target: aarch64-apple-darwin
            runner: macos-14              # Apple Silicon (M-series)
            os:     macos
            exe_suffix: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            os:     windows
            exe_suffix: ".exe"
    steps:
      - uses: actions/checkout@v6

      # ─── Linux deps:
      #   - `musl-tools` provides `musl-gcc`, which `cc-rs` uses when
      #     compiling C source (rusqlite's bundled SQLite, the ring
      #     crate's asm) for the `*-unknown-linux-musl` target.
      #   - `mold` linker is faster than ld; harmless when not picked
      #     up by the active target's `.cargo/config.toml` entry.
      #   - `clang` provides the C compiler that `cc-rs` chains to.
      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential mold clang pkg-config ca-certificates musl-tools

      # ─── macOS / Windows: nothing extra needed. All vectordata
      # deps are pure-Rust + cross-platform. The system toolchain
      # (Xcode CLT on macOS, bundled MSVC on windows-2022) covers
      # everything.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: vectordata-${{ matrix.target }}

      # ─── Build the `vectordata` binary in release mode. The crate
      # exposes both a library (default) and a CLI binary gated on the
      # `cli` feature (on by default). Build with the binary's required
      # feature explicitly so workspace consumers that disable `cli`
      # via their own configs can't accidentally turn this off.
      #
      # `CC_<target>=musl-gcc` makes `cc-rs` (used by rusqlite's
      # bundled SQLite and ring's asm) reach for the native musl-gcc
      # that `musl-tools` provides, instead of the cross-compiler
      # name (`x86_64-linux-musl-gcc`) that `cc-rs` defaults to but
      # `musl-tools` doesn't install. Both runners build natively
      # (x86_64 → x86_64-musl, arm → aarch64-musl) so the same env
      # variable shape works on both. The line is harmless on
      # non-musl targets — undefined variables don't get expanded.
      - name: Build vectordata (release)
        shell: bash
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: |
          set -euo pipefail
          cargo build --release -p vectordata \
            --target ${{ matrix.target }} \
            --features cli

      # ─── Build the `veks` binary in release mode.
      #
      # `--no-default-features` skips the `knnutils` feature, which
      # would otherwise pull in `veks-pipeline/knnutils` and force a
      # system-BLAS dependency (libopenblas on Linux, Accelerate on
      # macOS, and no clean story on Windows MSVC). The shipped binary
      # falls back to `compute knn` (stdarch) as its KNN engine — users
      # who need `compute knn-blas` can `cargo install veks` with their
      # own BLAS provider. This keeps the four release binaries
      # symmetric across platforms with no FFI surprises.
      - name: Build veks (release, no BLAS)
        shell: bash
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: |
          set -euo pipefail
          cargo build --release -p veks \
            --target ${{ matrix.target }} \
            --no-default-features

      # ─── Run vectordata's own tests against the target. cargo
      # test routes to a native or cross-built test runner based on
      # the target triple; our matrix uses native runners only, so
      # the host can execute the test binaries directly.
      #
      # `mkdir -p target/test-tmp` is required because `.cargo/config.toml`
      # sets `TMPDIR = "target/test-tmp"` (relative) per the project's
      # "tests use a project-local tmp" rule. Tests call
      # `tempfile::tempdir()` and expect TMPDIR to exist; locally the
      # directory accretes over time, but a clean CI checkout doesn't
      # have it yet and every tempdir-using test panics on first call.
      - name: Test vectordata
        shell: bash
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: |
          set -euo pipefail
          mkdir -p target/test-tmp
          cargo test --release -p vectordata \
            --target ${{ matrix.target }} \
            --features cli

      # ─── Smoke-test: each built binary actually starts and prints
      # its version. Catches LD_LIBRARY_PATH / shared-lib regressions
      # that a successful build wouldn't surface. Loops over both
      # binaries so a future addition just appends to the list.
      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          for name in vectordata veks; do
            bin_path="target/${{ matrix.target }}/release/${name}${{ matrix.exe_suffix }}"
            "$bin_path" --version
          done

      # ─── Dump dynamic-library deps for the run log. Helps debug
      # surprises later (a contributor adds a crate with an FFI dep
      # and suddenly the binary needs libfoo at runtime). Not a
      # gate — informational only on first pass; we can promote it
      # to a hard check once the link posture stabilises.
      - name: Inspect link posture
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          for name in vectordata veks; do
            bin_path="target/${{ matrix.target }}/release/${name}${{ matrix.exe_suffix }}"
            echo "── $name ──"
            file "$bin_path"
            case "${{ matrix.os }}" in
              linux) ldd  "$bin_path" || true ;;
              macos) otool -L "$bin_path" || true ;;
            esac
          done

      # Single-file upload: upload-artifact@v4+ flattens to the
      # basename when given one file, so each artifact zip contains
      # just the bare binary — no nested target/release/ dirs. Two
      # uploads per row, one per binary; the release job globs them
      # all back by pattern.
      - name: Upload vectordata binary
        # @v7 is the current Node-24-native release; @v4 (the prior
        # pin) ran on Node 20 and emits a deprecation warning on every
        # job run as of the 2025-09 GHA notice.
        uses: actions/upload-artifact@v7
        with:
          name: vectordata-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/vectordata${{ matrix.exe_suffix }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload veks binary
        uses: actions/upload-artifact@v7
        with:
          name: veks-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/veks${{ matrix.exe_suffix }}
          if-no-files-found: error
          retention-days: 14

  # ───────────────────────────────────────────────────────────
  # GitHub Release — only on `v*` tag refs. Downloads each
  # per-target binary artifact, renames each to include the
  # target triple, generates a SHA256SUMS file, and attaches
  # everything as Release assets (which the GitHub UI serves
  # without zip wrapping — unlike workflow artifacts). Auto-
  # generated changelog from commits since the previous tag.
  # Tags containing `-` (e.g. `v1.0.0-rc1`) get marked
  # `prerelease=true` automatically.
  # ───────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs: [build]
    # Fires only on the workspace-wide `v<version>` tags (e.g.
    # `v1.2.1`). Per-crate `cargo ws` tags (`vectordata@…`,
    # `veks-pipeline@…`, etc.) trigger the build matrix above but
    # do *not* create separate GitHub Releases — otherwise one
    # `cargo ws release` push would produce 5–6 near-identical
    # Releases, each holding the same binaries with a different
    # name.
    #
    # The `!contains('@')` guard distinguishes `refs/tags/v1.2.1`
    # (publish) from `refs/tags/vectordata@1.2.1` (build only) —
    # both start with `refs/tags/v` so the `startsWith` alone
    # isn't enough.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '@')
    permissions:
      contents: write
    steps:
      - name: Download per-target binary artifacts
        # @v8 is required to read artifacts produced by
        # actions/upload-artifact@v7 (v7 uploads zipped; v8 download
        # unzips by default). Two artifacts per platform — vectordata
        # and veks — pulled by globbing both name prefixes.
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '{vectordata,veks}-*'

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          # Each downloaded artifact is a directory named
          # `<binary>-<target>` containing a single bare binary
          # (`vectordata`, `veks`, `.exe` on Windows). Rename each to
          # include the target triple so users downloading multiple
          # platforms don't get filename collisions.
          for dir in artifacts/*; do
            base="${dir##*/}"               # e.g. "vectordata-x86_64-unknown-linux-gnu"
            binary="${base%%-*}"            # "vectordata" or "veks"
            target="${base#${binary}-}"     # "x86_64-unknown-linux-gnu"
            case "$target" in
              *windows*) src="$dir/${binary}.exe"; dst="release/${binary}-${target}.exe" ;;
              *)         src="$dir/${binary}";     dst="release/${binary}-${target}" ;;
            esac
            cp "$src" "$dst"
            chmod +x "$dst" || true
          done
          (cd release && sha256sum * > SHA256SUMS)
          ls -la release/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PRERELEASE: ${{ contains(github.ref_name, '-') }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file=$(mktemp)
          cat > "$notes_file" <<'EOF'
          ## Binaries

          Self-contained per-platform binaries — no archive, no install step.

          | Platform | `vectordata` | `veks` |
          | --- | --- | --- |
          | Linux amd64 | `vectordata-x86_64-unknown-linux-musl` | `veks-x86_64-unknown-linux-musl` |
          | Linux arm64 | `vectordata-aarch64-unknown-linux-musl` | `veks-aarch64-unknown-linux-musl` |
          | macOS Apple Silicon | `vectordata-aarch64-apple-darwin` | `veks-aarch64-apple-darwin` |
          | Windows amd64 | `vectordata-x86_64-pc-windows-msvc.exe` | `veks-x86_64-pc-windows-msvc.exe` |

          The Linux binaries are statically linked against musl libc.
          They run on any Linux kernel ≥ 2.6.39 with no glibc
          dependency — Ubuntu, Debian, RHEL/CentOS, Alpine, Amazon
          Linux, etc.

          Verify with `SHA256SUMS`.

          The published `veks` binary is built `--no-default-features`
          so it doesn't require a system BLAS at runtime. The
          `compute knn-blas` command is therefore unavailable in this
          binary; `compute knn` (stdarch) is the default KNN engine.
          Install via `cargo install veks` if you need the BLAS-backed
          engine and have a BLAS provider on your system.

          ## Changes

          EOF
          # Append GitHub's auto-generated changelog (commits + PRs
          # since the previous tag).
          gh api "repos/$REPO/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq .body >> "$notes_file"

          prerelease_flag=()
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_flag+=(--prerelease)
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$REPO" \
              --notes-file "$notes_file" "${prerelease_flag[@]}"
          else
            gh release create "$TAG" --repo "$REPO" \
              --title "$TAG" \
              --notes-file "$notes_file" "${prerelease_flag[@]}"
          fi

          # --clobber overwrites assets with the same name, so the
          # step is idempotent across retries.
          gh release upload "$TAG" --repo "$REPO" release/* --clobber
