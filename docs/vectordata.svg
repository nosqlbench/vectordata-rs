<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Tensor: Stacked matrix slabs — 3D tensor as layered grids -->
  <defs>
    <linearGradient id="g27" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0A09"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#g27)"/>
  <!-- Back slab (depth=2) -->
  <g transform="translate(16, 8)" opacity="0.3">
    <polygon points="16,16 88,16 80,24 8,24" fill="#A78BFA" stroke="#A78BFA" stroke-width="0.5"/>
    <polygon points="8,24 8,72 80,72 80,24" fill="#312E81" stroke="#A78BFA" stroke-width="0.5"/>
    <polygon points="80,24 88,16 88,64 80,72" fill="#3730A3" stroke="#A78BFA" stroke-width="0.5"/>
    <!-- Grid cells -->
    <g stroke="#7C3AED" stroke-width="0.5">
      <line x1="26" y1="16" x2="18" y2="24"/>
      <line x1="36" y1="16" x2="28" y2="24"/>
      <line x1="46" y1="16" x2="38" y2="24"/>
      <line x1="56" y1="16" x2="48" y2="24"/>
      <line x1="66" y1="16" x2="58" y2="24"/>
      <line x1="76" y1="16" x2="68" y2="24"/>
    </g>
  </g>
  <!-- Middle slab (depth=1) -->
  <g transform="translate(12, 20)" opacity="0.5">
    <polygon points="16,16 88,16 80,24 8,24" fill="#818CF8" stroke="#818CF8" stroke-width="0.5"/>
    <polygon points="8,24 8,72 80,72 80,24" fill="#312E81" stroke="#818CF8" stroke-width="0.5"/>
    <polygon points="80,24 88,16 88,64 80,72" fill="#3730A3" stroke="#818CF8" stroke-width="0.5"/>
    <!-- Row lines -->
    <g stroke="#6366F1" stroke-width="0.5" opacity="0.6">
      <line x1="8" y1="36" x2="80" y2="36"/><line x1="80" y1="36" x2="88" y2="28"/>
      <line x1="8" y1="48" x2="80" y2="48"/><line x1="80" y1="48" x2="88" y2="40"/>
      <line x1="8" y1="60" x2="80" y2="60"/><line x1="80" y1="60" x2="88" y2="52"/>
    </g>
    <!-- Col lines -->
    <g stroke="#6366F1" stroke-width="0.5" opacity="0.6">
      <line x1="20" y1="24" x2="20" y2="72"/><line x1="20" y1="24" x2="28" y2="16"/>
      <line x1="32" y1="24" x2="32" y2="72"/><line x1="32" y1="24" x2="40" y2="16"/>
      <line x1="44" y1="24" x2="44" y2="72"/><line x1="44" y1="24" x2="52" y2="16"/>
      <line x1="56" y1="24" x2="56" y2="72"/><line x1="56" y1="24" x2="64" y2="16"/>
      <line x1="68" y1="24" x2="68" y2="72"/><line x1="68" y1="24" x2="76" y2="16"/>
    </g>
  </g>
  <!-- Front slab (depth=0) — brightest -->
  <g transform="translate(8, 32)">
    <!-- Top face -->
    <polygon points="16,16 88,16 80,24 8,24" fill="#A5B4FC" stroke="#C7D2FE" stroke-width="0.75"/>
    <!-- Front face -->
    <polygon points="8,24 8,72 80,72 80,24" fill="#1E1B4B" stroke="#C7D2FE" stroke-width="0.75"/>
    <!-- Right face -->
    <polygon points="80,24 88,16 88,64 80,72" fill="#312E81" stroke="#C7D2FE" stroke-width="0.75"/>
    <!-- Grid: rows -->
    <g stroke="#6366F1" stroke-width="0.5">
      <line x1="8" y1="36" x2="80" y2="36"/><line x1="80" y1="36" x2="88" y2="28"/>
      <line x1="8" y1="48" x2="80" y2="48"/><line x1="80" y1="48" x2="88" y2="40"/>
      <line x1="8" y1="60" x2="80" y2="60"/><line x1="80" y1="60" x2="88" y2="52"/>
    </g>
    <!-- Grid: cols -->
    <g stroke="#6366F1" stroke-width="0.5">
      <line x1="20" y1="24" x2="20" y2="72"/><line x1="20" y1="24" x2="28" y2="16"/>
      <line x1="32" y1="24" x2="32" y2="72"/><line x1="32" y1="24" x2="40" y2="16"/>
      <line x1="44" y1="24" x2="44" y2="72"/><line x1="44" y1="24" x2="52" y2="16"/>
      <line x1="56" y1="24" x2="56" y2="72"/><line x1="56" y1="24" x2="64" y2="16"/>
      <line x1="68" y1="24" x2="68" y2="72"/><line x1="68" y1="24" x2="76" y2="16"/>
    </g>
    <!-- Highlighted cell values (heat) -->
    <rect x="20" y="36" width="12" height="12" fill="#F472B6" opacity="0.6"/>
    <rect x="44" y="24" width="12" height="12" fill="#FB923C" opacity="0.5"/>
    <rect x="56" y="48" width="12" height="12" fill="#22D3EE" opacity="0.5"/>
    <rect x="32" y="60" width="12" height="12" fill="#34D399" opacity="0.4"/>
    <rect x="68" y="36" width="12" height="12" fill="#FBBF24" opacity="0.5"/>
  </g>
  <!-- Axis labels -->
  <g font-family="monospace" font-size="9" fill="#94A3B8" opacity="0.6">
    <text x="60" y="118">i</text>
    <text x="104" y="70">j</text>
    <text x="26" y="18">k</text>
  </g>
</svg>
