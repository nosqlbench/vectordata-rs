name: toy

attributes:
  distance_function: L2
  is_normalized: true
  is_zero_vector_free: true
  is_duplicate_vector_free: true
  veks_version: 1.2.1
  veks_build: 0fc7f50258+dirty.1780582124

upstream:
  defaults:
    query_count: '50'
    seed: '7'
  steps:
  - id: count-vectors
    run: state set
    name: vector_count
    value: count:../base.fvecs
  - id: count-source-base
    run: state set
    name: source_base_count
    value: count:../base.fvecs
  - id: count-source-queries
    run: state set
    name: source_query_count
    value: 0
  - id: set-is_shuffled
    run: state set
    name: is_shuffled
    value: true
  - id: set-is_self_search
    run: state set
    name: is_self_search
    value: true
  - id: set-combined_bq
    run: state set
    name: combined_bq
    value: false
  - id: set-k
    run: state set
    name: k
    value: 10
  - id: prepare-vectors
    run: compute sort
    description: External merge-sort + duplicate detection (builds sorted-ordinal index in lex order)
    source: ../base.fvecs
    output: ${cache}/sorted_ordinals.ivecs
    duplicates: ${cache}/dedup_duplicates.ivecs
    report: ${cache}/dedup_report.json
  - id: count-duplicates
    run: state set
    after:
    - prepare-vectors
    name: duplicate_count
    value: count:${cache}/dedup_duplicates.ivecs
  - id: generate-shuffle
    run: generate shuffle
    description: Reproducible random permutation of base vector order
    after:
    - prepare-vectors
    output: ${cache}/shuffle.ivecs
    interval: ${clean_count}
    seed: ${seed}
    ordinals: ${cache}/sorted_ordinals.ivecs
  - id: extract-queries
    run: transform extract
    description: First 50 shuffled vectors -> query set (perturbed)
    after:
    - generate-shuffle
    source: ../base.fvecs
    ivec-file: ${cache}/shuffle.ivecs
    output: profiles/base/query_vectors.fvecs
    range: '[0,${query_count})'
    facet: query_vectors
    normalize: true
    perturb: true
  - id: extract-base
    run: transform extract
    description: Remainder of shuffled vectors -> base set
    after:
    - generate-shuffle
    source: ../base.fvecs
    ivec-file: ${cache}/shuffle.ivecs
    output: profiles/base/base_vectors.fvecs
    range: '[${query_count},${clean_count})'
    normalize: true
  - id: count-base
    run: state set
    after:
    - extract-base
    name: base_count
    value: count:profiles/base/base_vectors.fvecs
  - id: generate-metadata
    run: generate metadata
    description: Synthesize random integer metadata
    after:
    - count-vectors
    output: ${cache}/metadata_all.ivec
    layout-output: profiles/base/metadata_layout.slab
    count: ${vector_count}
    fields: 3
    range-min: 0
    range-max: 3
    seed: ${seed}
    format: ivec
  - id: extract-metadata
    run: transform extract
    description: Reorder metadata to match shuffled base vectors
    after:
    - generate-metadata
    - generate-shuffle
    source: ${cache}/metadata_all.ivec
    ivec-file: ${cache}/shuffle.ivecs
    output: profiles/base/metadata_content.ivec
    range: '[${query_count},${clean_count})'
  - id: generate-predicates
    run: generate simple-predicates
    description: Generate simple integer equality predicates
    after:
    - generate-metadata
    output: profiles/base/predicates.ivec
    count: 12000
    seed: ${seed}
    fields: 3
    range-min: 0
    range-max: 3
    format: ivec
  - id: evaluate-predicates
    run: compute evaluate-predicates
    after:
    - generate-predicates
    - extract-metadata
    per_profile: true
    phase: 1
    source: profiles/base/metadata_content.ivec
    predicates: profiles/base/predicates.ivec
    selectivity: 0.05
    mode: simple-int-eq
    fields: 3
    range: '[0,${base_end})'
    output: metadata_results.ivvecs
  - id: compute-knn
    run: compute knn
    description: Compute brute-force exact KNN ground truth
    after:
    - count-base
    - extract-queries
    per_profile: true
    base: profiles/base/base_vectors.fvecs[0..${base_count})
    query: profiles/base/query_vectors.fvecs
    indices: neighbor_indices.ivecs
    distances: neighbor_distances.fvecs
    neighbors: 10
    metric: L2
    normalized: false
  - id: compute-prefiltered-knn
    run: compute prefiltered-knn
    description: Compute filtered KNN with predicate pre-filtering
    after:
    - verify-predicates-sqlite
    - count-base
    - extract-queries
    per_profile: true
    phase: 2
    base: profiles/base/base_vectors.fvecs[0..${base_count})
    query: profiles/base/query_vectors.fvecs
    metadata-indices: metadata_results.ivvecs
    indices: prefiltered_neighbor_indices.ivec
    distances: prefiltered_neighbor_distances.fvec
    neighbors: 10
    metric: L2
  - id: compute-postfiltered-knn
    run: compute postfiltered-knn
    description: Derive post-filter KNN ground truth (E = G ∩ R)
    after:
    - compute-knn
    - evaluate-predicates
    per_profile: true
    phase: 2
    metadata-indices: metadata_results.ivvecs
    indices: postfiltered_neighbor_indices.ivec
    distances: postfiltered_neighbor_distances.fvec
  - id: verify-knn
    run: verify knn-consolidated
    description: Multi-threaded single-pass KNN verification across all profiles
    after:
    - compute-knn
    base: profiles/base/base_vectors.fvecs[0..${base_count})
    query: profiles/base/query_vectors.fvecs
    metric: L2
    sample: 0
    seed: ${seed}
    output: ${cache}/verify_knn_consolidated.json
    normalized: false
  - id: verify-predicates-sqlite
    run: verify predicates-sqlite
    description: Verify predicate evaluations using SQLite oracle
    after:
    - evaluate-predicates
    per_profile: true
    phase: 1
    metadata: profiles/base/metadata_content.ivec
    predicates: profiles/base/predicates.ivec
    results: metadata_results.ivvecs
    fields: 3
    output: ${cache}/${profile_name}_verify_predicates_sqlite.json
  - id: verify-prefiltered-knn
    run: verify prefiltered-knn-consolidated
    description: Verify filtered KNN results via brute-force recomputation
    after:
    - compute-prefiltered-knn
    base: profiles/base/base_vectors.fvecs
    query: profiles/base/query_vectors.fvecs
    metadata: profiles/base/metadata_content.ivec
    predicates: profiles/base/predicates.ivec
    metric: L2
    normalized: false
    sample: 50
    seed: ${seed}
    output: ${cache}/verify_prefiltered_knn.json
  - id: verify-postfiltered-knn
    run: verify postfiltered-knn-consolidated
    description: Verify post-filter KNN (E = G ∩ R) via re-derivation
    after:
    - compute-postfiltered-knn
    sample: 50
    seed: ${seed}
    output: ${cache}/verify_postfiltered_knn.json
  - id: generate-dataset-json
    run: generate dataset-json
    description: Generate dataset.json from dataset.yaml
    after:
    - verify-knn
    - verify-prefiltered-knn
    - verify-postfiltered-knn
    - verify-predicates-sqlite
    finalize: true
  - id: generate-variables-json
    run: generate variables-json
    description: Generate variables.json from variables.yaml
    after:
    - generate-dataset-json
    finalize: true
  - id: generate-dataset-log-jsonl
    run: generate dataset-log-jsonl
    description: Generate dataset.jsonl from dataset.log
    after:
    - generate-dataset-json
    finalize: true
  - id: generate-docs
    run: analyze describe-dataset
    description: Generate dataset documentation in docs/
    after:
    - generate-variables-json
    - generate-dataset-log-jsonl
    finalize: true
    exemplars: true
  - id: generate-catalog
    run: catalog generate
    description: Generate catalog index for the dataset directory
    after:
    - generate-docs
    finalize: true
    source: .
  - id: generate-merkle
    run: merkle create
    description: Create merkle hash trees for all publishable data files
    after:
    - generate-catalog
    finalize: true
    source: .
    min-size: 0

profiles:
  default:
    maxk: 10
    base_vectors: profiles/base/base_vectors.fvecs
    query_vectors: profiles/base/query_vectors.fvecs
    metadata_content: profiles/base/metadata_content.ivec
    metadata_predicates: profiles/base/predicates.ivec
    metadata_layout: profiles/base/metadata_layout.slab
    neighbor_indices: profiles/default/neighbor_indices.ivecs
    neighbor_distances: profiles/default/neighbor_distances.fvecs
    metadata_results: profiles/default/metadata_results.ivvecs
    prefiltered_neighbor_indices: profiles/default/prefiltered_neighbor_indices.ivec
    prefiltered_neighbor_distances: profiles/default/prefiltered_neighbor_distances.fvec
    postfiltered_neighbor_indices: profiles/default/postfiltered_neighbor_indices.ivec
    postfiltered_neighbor_distances: profiles/default/postfiltered_neighbor_distances.fvec

variables:
  base_count: '1950'
  clean_count: '2000'
  combined_bq: 'false'
  dataset_name: 'toy'
  dim: '16'
  distance_function: 'L2'
  duplicate_count: '0'
  extract_input_count: '1950'
  extract_output_count: '1950'
  is_normalized: 'true'
  is_self_search: 'true'
  is_shuffled: 'true'
  k: '10'
  knn_queries_with_ties: '0'
  knn_tied_neighbors: '0'
  max_normal_epsilon: '2.126664664785193e0'
  mean_normal_epsilon: '1.296007920934646e0'
