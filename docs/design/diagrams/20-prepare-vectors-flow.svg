<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="592" font-family="Helvetica, Arial, sans-serif">
  <rect width="1080" height="592" fill="white" />
  <defs>
    <marker id="arrow_c4caf50" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4caf50" />
    </marker>
    <marker id="arrow_cff9800" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ff9800" />
    </marker>
    <marker id="arrow_c2196f3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#2196f3" />
    </marker>
    <marker id="arrow_c9c27b0" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#9c27b0" />
    </marker>
    <marker id="arrow_cf44336" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f44336" />
    </marker>
    <marker id="arrow_c9e9e9e" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#9e9e9e" />
    </marker>
  </defs>
  <text x="540" y="30" text-anchor="middle" font-size="14" font-weight="bold">prepare-vectors: Internal Data Flow (SRD §20.3)</text>
  <g>
    <title>Raw source vector file — may contain duplicates and near-zero vectors.
All vectors in their original order.</title>
    <rect x="250" y="58" width="580" height="48" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5" />
    <text x="540" y="79" text-anchor="middle" font-size="11" font-weight="bold">Source Vectors</text>
    <text x="540" y="93" text-anchor="middle" font-size="9" fill="#666">(fvec/mvec, any order)</text>
  </g>
  <g>
    <title>External merge sort: read memory-sized segments from source,
sort each by 10-component lexicographic prefix keys, write to run files.
Multiple segments for datasets larger than RAM.
Prefix width is fixed at 10 (sufficient for all known embedding models).</title>
    <rect x="50" y="122" width="980" height="48" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5" />
    <text x="540" y="143" text-anchor="middle" font-size="11" font-weight="bold">Phase 1: Create Sorted Runs (per segment)</text>
    <text x="540" y="157" text-anchor="middle" font-size="9" fill="#666">Read N vectors → sort by 10-dim prefix → write run file</text>
  </g>
  <g>
    <title>Sort vectors within the segment by component values.
10-dim prefix keys avoid full-vector comparisons for most pairs.</title>
    <rect x="50" y="186" width="380" height="48" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5" />
    <text x="240" y="207" text-anchor="middle" font-size="11" font-weight="bold">Sort Segment</text>
    <text x="240" y="221" text-anchor="middle" font-size="9" fill="#666">Lexicographic order (10-dim prefix)</text>
  </g>
  <g>
    <title>Scan sorted pairs for exact equality.
One representative kept; extras recorded as duplicates.</title>
    <rect x="450" y="186" width="180" height="48" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" />
    <text x="540" y="207" text-anchor="middle" font-size="11" font-weight="bold">Detect Dups</text>
    <text x="540" y="221" text-anchor="middle" font-size="9" fill="#666">Adjacent compare</text>
  </g>
  <g>
    <title>Compute L2 norm for each vector in f64 precision.
All arithmetic in IEEE 754 binary64 regardless of storage type.
SRD §18.2, §19.2.</title>
    <rect x="650" y="186" width="180" height="48" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" />
    <text x="740" y="200" text-anchor="middle" font-size="11" font-weight="bold">Compute L2</text>
    <text x="740" y="214" text-anchor="middle" font-size="11" font-weight="bold">Norm (f64)</text>
    <text x="740" y="228" text-anchor="middle" font-size="9" fill="#666">‖x‖₂ = √Σxᵢ²</text>
  </g>
  <g>
    <title>Accumulate normalization quality statistics:
mean_ε, min_ε, max_ε, median_ε.
Determines is_normalized flag.</title>
    <rect x="850" y="186" width="180" height="48" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" />
    <text x="940" y="200" text-anchor="middle" font-size="11" font-weight="bold">Track Norm</text>
    <text x="940" y="214" text-anchor="middle" font-size="11" font-weight="bold">Statistics</text>
    <text x="940" y="228" text-anchor="middle" font-size="9" fill="#666">ε = |‖x‖₂ − 1|</text>
  </g>
  <g>
    <title>If L2 norm &lt; threshold (default 1e-6),
classify as near-zero vector.
Compared in squared space: Σxᵢ² &lt; τ².
SRD §19.2.</title>
    <rect x="650" y="250" width="180" height="48" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5" />
    <text x="740" y="271" text-anchor="middle" font-size="11" font-weight="bold">Near-Zero?</text>
    <text x="740" y="285" text-anchor="middle" font-size="9" fill="#666">‖x‖₂ &lt; 1×10⁻⁶</text>
  </g>
  <g>
    <title>Merge all sorted run files using prefix-key comparison.
During merge, detect cross-run duplicates.
Output: sorted_ordinals.ivec (canonical order).</title>
    <rect x="250" y="314" width="580" height="48" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5" />
    <text x="540" y="335" text-anchor="middle" font-size="11" font-weight="bold">Phase 2: K-Way Merge + Dedup</text>
    <text x="540" y="349" text-anchor="middle" font-size="9" fill="#666">Merge sorted runs → unified sorted index</text>
  </g>
  <g>
    <title>Write dedup_report.json with statistics.
Save variables to variables.yaml:
vector_count, duplicate_count, zero_count,
mean_normal_epsilon, is_normalized, etc.</title>
    <rect x="250" y="378" width="580" height="48" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" />
    <text x="540" y="399" text-anchor="middle" font-size="11" font-weight="bold">Phase 3: Write Report + Variables</text>
    <text x="540" y="413" text-anchor="middle" font-size="9" fill="#666">Persist provenance metrics</text>
  </g>
  <line x1="540" y1="106" x2="540" y2="122" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrow_c4caf50)" />
  <polyline points="540,170 540,178 340,178 340,186" fill="none" stroke="#2196f3" stroke-width="1.5" marker-end="url(#arrow_c2196f3)" />
  <text x="445" y="175" font-size="9" fill="#2196f3">segment in RAM</text>
  <line x1="420" y1="210" x2="460" y2="210" stroke="#2196f3" stroke-width="1.5" marker-end="url(#arrow_c2196f3)" />
  <line x1="620" y1="210" x2="660" y2="210" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow_c9c27b0)" />
  <line x1="820" y1="210" x2="860" y2="210" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow_c9c27b0)" />
  <line x1="740" y1="234" x2="740" y2="250" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrow_cf44336)" />
  <polyline points="340,234 340,274 540,274 540,314" fill="none" stroke="#2196f3" stroke-width="1.5" marker-end="url(#arrow_c2196f3)" />
  <text x="445" y="271" font-size="9" fill="#2196f3">run files</text>
  <line x1="540" y1="362" x2="540" y2="378" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrow_c9e9e9e)" />
  <g>
    <title>Canonical sorted ordinal index.
Used by generate-shuffle and extract-base.</title>
    <rect x="50" y="442" width="180" height="48" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5" />
    <polygon points="222,442 230,450 222,450" fill="white" stroke="#4caf50" stroke-width="1" />
    <text x="140" y="464" text-anchor="middle" font-size="9" font-weight="bold">sorted_ordinals</text>
    <text x="140" y="477" text-anchor="middle" font-size="9" font-weight="normal">.ivec</text>
  </g>
  <g>
    <title>Ordinals of exact duplicate vectors.
Excluded from extraction.</title>
    <rect x="250" y="442" width="180" height="48" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" />
    <polygon points="422,442 430,450 422,450" fill="white" stroke="#e91e63" stroke-width="1" />
    <text x="340" y="464" text-anchor="middle" font-size="9" font-weight="bold">dedup_duplicates</text>
    <text x="340" y="477" text-anchor="middle" font-size="9" font-weight="normal">.ivec</text>
  </g>
  <g>
    <title>Ordinals of near-zero vectors (L2 &lt; 1e-6).
Excluded from extraction.
Post-hoc verification artifact.</title>
    <rect x="450" y="442" width="180" height="48" fill="#ffebee" stroke="#f44336" stroke-width="1.5" />
    <polygon points="622,442 630,450 622,450" fill="white" stroke="#f44336" stroke-width="1" />
    <text x="540" y="464" text-anchor="middle" font-size="9" font-weight="bold">zero_ordinals</text>
    <text x="540" y="477" text-anchor="middle" font-size="9" font-weight="normal">.ivec</text>
  </g>
  <g>
    <title>Statistics report: unique count, dup count,
prefix width, processing time.</title>
    <rect x="650" y="442" width="180" height="48" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5" />
    <polygon points="822,442 830,450 822,450" fill="white" stroke="#9e9e9e" stroke-width="1" />
    <text x="740" y="464" text-anchor="middle" font-size="9" font-weight="bold">dedup_report</text>
    <text x="740" y="477" text-anchor="middle" font-size="9" font-weight="normal">.json</text>
  </g>
  <g>
    <title>Saved variables:
  duplicate_count, zero_count,
  mean_normal_epsilon, is_normalized,
  max_normal_epsilon, normal_threshold.</title>
    <rect x="850" y="442" width="180" height="48" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" />
    <polygon points="1022,442 1030,450 1022,450" fill="white" stroke="#9c27b0" stroke-width="1" />
    <text x="940" y="464" text-anchor="middle" font-size="9" font-weight="bold">variables.yaml</text>
    <text x="940" y="477" text-anchor="middle" font-size="9" font-weight="normal">(norm stats)</text>
  </g>
  <text x="35" y="202" text-anchor="end" font-size="9" fill="#999" font-style="italic">cache-hot:</text>
  <text x="35" y="213" text-anchor="end" font-size="9" fill="#999" font-style="italic">data in L1/L2</text>
  <text x="35" y="224" text-anchor="end" font-size="9" fill="#999" font-style="italic">from sort</text>
  <line x1="140" y1="426" x2="140" y2="442" stroke="#4caf50" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow_c4caf50)" />
  <line x1="340" y1="426" x2="340" y2="442" stroke="#e91e63" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow_ce91e63)" />
  <line x1="540" y1="426" x2="540" y2="442" stroke="#f44336" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow_cf44336)" />
  <line x1="740" y1="426" x2="740" y2="442" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow_c9e9e9e)" />
  <line x1="940" y1="426" x2="940" y2="442" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow_c9c27b0)" />
  <text x="40" y="577" font-size="8" fill="#888">
    <a href="20-unified-sort-normalize-extract.md">SRD §20 — Unified Sort–Normalize–Extract Pipeline</a>
     · <a href="18-normalization-analysis.md">§18 — Normalization</a>
     · <a href="19-zero-vector-detection.md">§19 — Zero Detection</a>
  </text>
</svg>
